steps:
  # 1. Build the multi-stage Docker image for the FastAPI backend
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--target', 'backend-runner',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest',
      '.'
    ]
    id: 'Build Container Image'

  # 2. Push the built image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'
    ]
    id: 'Push Image to Registry'

  # 3. Deploy the container to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', '${_SERVICE_NAME}',
      '--image', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest',
      '--region', '${_REGION}',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '2Gi',
      '--cpu', '2',
      '--min-instances', '0',
      '--max-instances', '10',
      '--set-env-vars', 'USE_PYTHON_BACKEND=true,FIRESTORE_DATABASE=(default),GCS_BUCKET_NAME=${PROJECT_ID}-smart-city-rag-bucket,PUBSUB_TOPIC=municipal-events-topic,BIGQUERY_DATASET=smartcity_dataset,BIGQUERY_TABLE=complaints_table'
    ]
    id: 'Deploy to Cloud Run'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest'

substitutions:
  _REGION: 'us-central1'
  _AR_REPO: 'smart-city-apps'
  _SERVICE_NAME: 'smart-city-os'

options:
  logging: CLOUD_LOGGING_ONLY
